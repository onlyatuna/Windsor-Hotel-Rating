name: Scrape Windsor Hotel Reviews

on:
  schedule:
    - cron: '0 2 * * *'   # 每天台灣時間上午 10 點（UTC+8 → UTC 02:00）
  workflow_dispatch:        # 允許在 GitHub 上手動觸發

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: pip install selenium webdriver-manager pandas

      - name: Run scraper
        run: python scraper.py

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: screenshot_*.png

      - name: Commit and push reviews.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reviews.csv
          git diff --staged --quiet || git commit -m "data: auto-update reviews [skip ci]"
          git push
